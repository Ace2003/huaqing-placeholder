services:
  - type: web
    name: cat-sixth-sense
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: STEPFUN_KEY
        sync: false  # 在 Render 后台 Environment 面板填真实值
